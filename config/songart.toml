# ==============================================================================
# songart Configuration
# Raspberry Pi music recognition + album art + live visualizer display
# ==============================================================================


# ------------------------------------------------------------------------------
# Logging
# ------------------------------------------------------------------------------

[logging]
# Options: "error", "info", "debug"
level = "debug"

# Main log output file.
file = "/home/admin/projects/songart/songart.log"

# Clear the log file each time songart starts.
reset_on_start = true


# ------------------------------------------------------------------------------
# Audio Capture + Recognition
# ------------------------------------------------------------------------------

[audio]
# PulseAudio / PipeWire source or monitor name.
device = "ps3eye_mono"

# Path used for SongRec recognition snapshots.
sample_wav = "/home/admin/projects/songart/sample.wav"

# Delay between recognition attempts.
loop_delay_secs = 3

# Continuous capture settings.
sample_rate = 16000
channels = 1
buffer_seconds = 20

# Amount of recent buffered audio written to WAV for SongRec.
recognition_window_ms = 10000

# Size of read chunks from the live capture stream.
read_chunk_bytes = 1024


# ------------------------------------------------------------------------------
# External Paths
# ------------------------------------------------------------------------------

[paths]
# Local SongRec binary used for recognition.
songrec_bin = "/home/admin/projects/vendor/songrec/target/release/songrec"

# Current artwork image written by the recognition loop and read by the renderer.
artwork_file = "/home/admin/projects/songart/current.jpg"


# ------------------------------------------------------------------------------
# Display
# ------------------------------------------------------------------------------

[display]
window_title = "songart"
fullscreen = true

# Options should match one of the [display_presets.*] sections below.
orientation = "portrait"

# ~16 ms targets roughly 60 FPS.
frame_delay_ms = 16


# ------------------------------------------------------------------------------
# Display Colors
# ------------------------------------------------------------------------------

[display.colors]
# Overall canvas background.
background = "#000000"

# Background behind the artwork/top region.
artwork_background = "#000000"

# Background behind song title / artist / album metadata.
metadata_background = "#000000"

# Background behind the analyzer / visualizer.
visualizer_background = "#000000"


# ------------------------------------------------------------------------------
# Portrait Layout
# ------------------------------------------------------------------------------

[display_presets.portrait]
# Native portrait resolution for the current display.
width = 1080
height = 1920

# Portion of the screen used by the top/artwork area.
# Lower values give more vertical room to metadata + visualizer.
top_panel_ratio = 0.66

# Text panel positioning.
panel_x = 48
panel_y = 36

# Text spacing.
title_line_spacing = 52
body_line_spacing = 38
detail_line_spacing = 44


# ------------------------------------------------------------------------------
# Landscape Layout
# ------------------------------------------------------------------------------

[display_presets.landscape]
width = 1920
height = 1080

top_panel_ratio = 0.72

panel_x = 40
panel_y = 28

title_line_spacing = 46
body_line_spacing = 34
detail_line_spacing = 40


# ------------------------------------------------------------------------------
# Font Selection
# ------------------------------------------------------------------------------

[fonts]
# Default/manual font theme.
theme = "scripted"

# Options:
# fixed     = always use [fonts].theme
# metadata  = choose based on genre/year/song metadata
# random    = planned/future option
mode = "metadata"

# Used when metadata does not match a known rule.
fallback_theme = "simple"


# ------------------------------------------------------------------------------
# Font Themes
# ------------------------------------------------------------------------------

[font_themes.modern]
title = "/home/admin/projects/songart/assets/fonts/Orbitron-VariableFont_wght.ttf"
body = "/home/admin/projects/songart/assets/fonts/Orbitron-VariableFont_wght.ttf"
title_size = 34
body_size = 24

[font_themes.simple]
title = "/home/admin/projects/songart/assets/fonts/SyneMono-Regular.ttf"
body = "/home/admin/projects/songart/assets/fonts/SyneMono-Regular.ttf"
title_size = 32
body_size = 22

[font_themes.retro]
title = "/home/admin/projects/songart/assets/fonts/Audiowide-Regular.ttf"
body = "/home/admin/projects/songart/assets/fonts/Audiowide-Regular.ttf"
title_size = 36
body_size = 24

[font_themes.techy]
title = "/home/admin/projects/songart/assets/fonts/Orbitron-VariableFont_wght.ttf"
body = "/home/admin/projects/songart/assets/fonts/SyneMono-Regular.ttf"
title_size = 36
body_size = 24

[font_themes.grungy]
title = "/home/admin/projects/songart/assets/fonts/SpecialElite-Regular.ttf"
body = "/home/admin/projects/songart/assets/fonts/SpecialElite-Regular.ttf"
title_size = 34
body_size = 23

[font_themes.fantasy]
title = "/home/admin/projects/songart/assets/fonts/Elvencommonspeak-0WXz.ttf"
body = "/home/admin/projects/songart/assets/fonts/Elvencommonspeak-0WXz.ttf"
title_size = 38
body_size = 22

[font_themes.scripted]
title = "/home/admin/projects/songart/assets/fonts/GloriaHallelujah-Regular.ttf"
body = "/home/admin/projects/songart/assets/fonts/GloriaHallelujah-Regular.ttf"
title_size = 34
body_size = 22


# ------------------------------------------------------------------------------
# Visualizer
# ------------------------------------------------------------------------------

[visualizer]
enabled = true

# Options currently include: "spectrum", "oscilloscope", "analog_vu"
mode = "spectrum"

# Visualizer size and padding.
height = 300
padding = 16

# Peak hold keeps the analog VU peak lamp/needle emphasis visible longer.
peak_hold = false


# ------------------------------------------------------------------------------
# Visualizer Timing + Level Controls
# ------------------------------------------------------------------------------

# Amount of recent audio used for each visualizer frame.
window_ms = 120

# Number of points used by oscilloscope-style modes.
point_count = 180

# General visualizer gain controls.
gain = 1.0
max_gain = 8.0
y_scale = 1.0

# Oscilloscope channel placement.
left_y_offset = 0.25
right_y_offset = 0.75
visible_sample_count = 384

# Interval for visualizer debug logging.
debug_log_interval_ms = 10000


# ------------------------------------------------------------------------------
# Spectrum Analyzer Shape
# ------------------------------------------------------------------------------

# Number of displayed spectrum bars.
spectrum_bin_count = 64

# FFT size used to calculate spectrum bins.
spectrum_fft_size = 1024

# Frequency range displayed by the analyzer.
spectrum_min_hz = 60.0
spectrum_max_hz = 5000.0

# Gap between spectrum bars.
spectrum_bar_gap = 2


# ------------------------------------------------------------------------------
# Spectrum Analyzer Responsiveness
# ------------------------------------------------------------------------------

# Higher = faster bar rise.
# Lower = softer/slower movement.
spectrum_attack = 0.18

# Lower = more responsive/faster fall.
# Higher = smoother/slower fall.
spectrum_smoothing = 0.28


# ------------------------------------------------------------------------------
# Spectrum Analyzer Scaling
# ------------------------------------------------------------------------------

# These control how FFT magnitudes are shaped into visible bar heights.
spectrum_log_epsilon = 0.000001
spectrum_log_scale = 0.14
spectrum_log_offset = 0.62

# Raise this to suppress room noise / ambient floor.
spectrum_noise_floor = 0.26

# Higher values increase contrast and keep quiet bars lower.
spectrum_contrast = 1.45


# ------------------------------------------------------------------------------
# Spectrum Analyzer Rendering
# ------------------------------------------------------------------------------

[visualizer.spectrum]
# Options: "full", "top_only"
# render_style = "full"
render_style = "top_only"

# When render_style = "top_only", use the full analyzer height and draw this
top_only_height_ratio = 0.99


# ------------------------------------------------------------------------------
# Spectrum Peak Markers
# ------------------------------------------------------------------------------

[visualizer.peaks]
enabled = true
hold_ms = 30
drop_pixels = 2
color = "#FFFFFF"
use_bar_color = true


# ------------------------------------------------------------------------------
# Artwork Color Background Matching
# ------------------------------------------------------------------------------

[visualizer.colors]
mode = "artwork"       # fixed, artwork

# Used when mode = "fixed"
upper = "#50DC78"
lower = "#50A0FF"

# Used when mode = "artwork" but extraction fails
fallback_upper = "#50DC78"
fallback_lower = "#50A0FF"

# Minimum perceived brightness for artwork-derived colors
min_brightness = 80

# Helps avoid muddy gray/brown colors
min_saturation = 0.25

# Number of artwork-derived colors used across spectrum bars.
palette_size = 6

# Number of hue regions sampled when building the artwork palette.
hue_bucket_count = 12
